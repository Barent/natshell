name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  release-assets:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          repo="${{ github.repository }}"

          # Create release if it doesn't already exist (retry up to 3 times for transient 5xx)
          for i in 1 2 3; do
            if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
              echo "Release $tag already exists"
              break
            fi
            echo "Attempt $i: creating release $tag"
            if gh release create "$tag" --repo "$repo" --title "$tag" --generate-notes; then
              echo "Release created"
              break
            fi
            sleep 5
          done

          # Verify release exists before uploading
          gh release view "$tag" --repo "$repo" >/dev/null

          # Delete existing assets to avoid 422 "already exists" errors
          for f in dist/*; do
            name="$(basename "$f")"
            gh release delete-asset "$tag" "$name" --repo "$repo" --yes 2>/dev/null || true
          done

          gh release upload "$tag" dist/* --repo "$repo"
